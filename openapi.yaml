openapi: 3.0.3
info:
  title: Node-Media-Server REST API
  description: API for managing and monitoring the Node-Media-Server.
  version: 0.1.0-dev29
servers:
  - url: http://localhost:8000
    description: Default HTTP server
  - url: https://localhost:8443
    description: Default HTTPS server

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  schemas:
    ServerInfo:
      type: object
      properties:
        os:
          type: object
          properties:
            arch: { type: string }
            platform: { type: string }
            release: { type: string }
        cpu:
          type: object
          properties:
            num: { type: integer }
            load: { type: number }
            model: { type: string }
            speed: { type: integer }
        mem:
          type: object
          properties:
            total: { type: integer }
            free: { type: integer }
        net:
          type: object
          properties:
            inbytes: { type: integer }
            outbytes: { type: integer }
        nodejs:
          type: object
          properties:
            uptime: { type: integer }
            version: { type: string }
            mem: { type: object }
        clients:
          type: object
          properties:
            accepted: { type: integer }
            active: { type: integer }
            idle: { type: integer }
            rtmp: { type: integer }
            http: { type: integer }
            ws: { type: integer }
        version: { type: string }

    ServerStatus:
      type: object
      properties:
        av: { $ref: '#/components/schemas/ComponentStatus' }
        fission: { $ref: '#/components/schemas/ComponentStatus' }
        relay: { $ref: '#/components/schemas/ComponentStatus' }
        rtmp: { $ref: '#/components/schemas/ComponentStatus' }
        trans: { $ref: '#/components/schemas/ComponentStatus' }
        switch: { $ref: '#/components/schemas/ComponentStatus' }

    ComponentStatus:
      type: object
      properties:
        running: { type: boolean }

    Config:
      type: object
      properties:
        http: { $ref: '#/components/schemas/HttpConfig' }
        https: { $ref: '#/components/schemas/HttpsConfig' }
        rtmp: { $ref: '#/components/schemas/RtmpConfig' }
        trans: { $ref: '#/components/schemas/TransConfig' }
        relay: { $ref: '#/components/schemas/RelayConfig' }
        fission: { $ref: '#/components/schemas/FissionConfig' }
        av: { $ref: '#/components/schemas/AvConfig' }
        switch: { $ref: '#/components/schemas/SwitchConfig' }
        static: { $ref: '#/components/schemas/StaticConfig' }
        cluster: { $ref: '#/components/schemas/ClusterConfig' }
        auth: { $ref: '#/components/schemas/AuthConfig' }
        logType: { $ref: '#/components/schemas/LogType' }
        rollingLogLength: { type: integer }

    HttpConfig:
      type: object
      properties:
        mediaroot: { type: string }
        port: { type: integer }
        allow_origin: { type: string }
        api: { type: boolean }
        webroot: { type: string }

    HttpsConfig:
      type: object
      properties:
        port: { type: integer }
        key: { type: string }
        cert: { type: string }
        passphrase: { type: string }

    RtmpConfig:
      type: object
      properties:
        port: { type: integer }
        ssl:
          type: object
          properties:
            port: { type: integer }
            key: { type: string }
            cert: { type: string }
        chunk_size: { type: integer }
        ping: { type: integer }
        ping_timeout: { type: integer }
        gop_cache: { type: boolean }

    TransConfig:
      type: object
      properties:
        ffmpeg: { type: string }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/TransTaskConfig' }

    TransTaskConfig:
      type: object
      properties:
        app: { type: string }
        pattern: { type: string }
        rtmp: { type: boolean }
        rtmpApp: { type: string }
        mp4: { type: boolean }
        mp4Flags: { type: string }
        hls: { type: boolean }
        hlsFlags: { type: string }
        hlsKeep: { type: boolean }
        dash: { type: boolean }
        dashFlags: { type: string }
        dashKeep: { type: boolean }
        vc: { type: string }
        vcParam: { type: array, items: { type: string } }
        ac: { type: string }
        acParam: { type: array, items: { type: string } }

    RelayConfig:
      type: object
      properties:
        ffmpeg: { type: string }
        tasks:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/RelayPullTaskConfig'
              - $ref: '#/components/schemas/RelayPushTaskConfig'

    RelayPullTaskConfig:
      allOf:
        - $ref: '#/components/schemas/RelayTaskConfig'
        - type: object
          properties:
            app: { type: string }
            mode: { type: string, enum: [pull] }

    RelayPushTaskConfig:
      allOf:
        - $ref: '#/components/schemas/RelayTaskConfig'
        - type: object
          properties:
            app: { type: string }
            pattern: { type: string }
            mode: { type: string, enum: [push] }

    RelayTaskConfig:
      type: object
      properties:
        mode: { $ref: '#/components/schemas/RelayMode' }
        edge: { type: string }
        rescale: { type: string }
        rtsp_transport: { $ref: '#/components/schemas/RtspTransport' }
        appendName: { type: boolean }

    RelayMode:
      type: string
      enum: [push, pull]

    RtspTransport:
      type: string
      enum: [udp, tcp, udp_multicast, http]

    FissionConfig:
      type: object
      properties:
        ffmpeg: { type: string }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/FissionTaskConfig' }

    FissionTaskConfig:
      type: object
      properties:
        app: { type: string }
        pattern: { type: string }
        model:
          type: array
          items: { $ref: '#/components/schemas/FissionModelConfig' }

    FissionModelConfig:
      type: object
      properties:
        vb: { type: string }
        vf: { type: string }
        vs: { type: string }
        ab: { type: string }

    AvConfig:
      type: object

    ClusterConfig:
      type: object

    SwitchConfig:
      type: object
      properties:
        tasks:
          type: array
          items: { $ref: '#/components/schemas/SwitchTaskConfig' }

    SwitchTaskConfig:
      type: object
      properties:
        app: { type: string }
        name: { type: string }
        sources:
          type: array
          items: { type: string }
        defaultSource: { type: string }
        switchTimeout: { type: number }

    StaticConfig:
      type: object
      properties:
        ffmpeg: { type: string }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/StaticTaskConfig' }

    StaticTaskConfig:
      type: object
      properties:
        app: { type: string }
        name: { type: string }
        input: { type: string }
        textPath: { type: string }

    AuthConfig:
      type: object
      properties:
        api: { type: boolean }
        api_user: { type: string }
        api_pass: { type: string }
        play: { type: boolean }
        publish: { type: boolean }
        secret: { type: string }

    LogType:
      type: integer
      enum: [0, 1, 2, 3, 4, 5]
      description: "0: NONE, 1: ERROR, 2: WARN, 3: NORMAL, 4: DEBUG, 5: FFDEBUG"
    
    SessionState:
      type: string
      enum: [CONNECTING, CONNECTED, STARTING, RUNNING, STOPPING, STOPPED, RESTARTING]
    
    BroadcastState:
      type: string
      enum: [REGISTERING, REGISTERED, LIVE, SWITCHING, OFFLINE, STOPPING, STOPPED]

    StreamsTree:
      type: object
      properties:
        broadcasts:
          type: array
          items: { $ref: '#/components/schemas/BroadcastTreeNode' }
        orphans:
          type: array
          items: { $ref: '#/components/schemas/SessionNode' }

    BroadcastTreeNode:
      type: object
      properties:
        id: { type: string }
        streamPath: { type: string }
        state: { $ref: '#/components/schemas/BroadcastState' }
        publisher: { $ref: '#/components/schemas/SessionNode' }
        subscribers:
          type: array
          items: { $ref: '#/components/schemas/SessionNode' }

    SessionNode:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        state: { $ref: '#/components/schemas/SessionState' }
        children:
          type: array
          items: { $ref: '#/components/schemas/SessionNode' }

    StreamStats:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: object
          properties:
            key: { type: string }
            app: { type: string }
            name: { type: string }
            id: { type: string }
            state: { $ref: '#/components/schemas/BroadcastState' }
            publisher:
              nullable: true
              $ref: '#/components/schemas/PublisherInfo'
            subscribers:
              type: array
              items:
                $ref: '#/components/schemas/SubscriberInfo'

    PublisherInfo:
      type: object
      properties:
        app: { type: string }
        stream: { type: string }
        clientId: { type: string }
        ip: { type: string }
        state: { $ref: '#/components/schemas/SessionState' }
        protocol: { type: string }
        connectCreated: { type: integer }
        video:
          nullable: true
          type: object
          properties:
            codec: { type: string }
            width: { type: integer }
            height: { type: integer }
            profile: { type: string }
            level: { type: integer }
            fps: { type: number }
        audio:
          nullable: true
          type: object
          properties:
            codec: { type: string }
            profile: { type: string }
            channels: { type: integer }
            samplerate: { type: integer }
        bytes: { type: integer }

    SubscriberInfo:
      type: object
      properties:
        app: { type: string }
        stream: { type: string }
        clientId: { type: string }
        state: { $ref: '#/components/schemas/SessionState' }
        connectCreated: { type: integer }
        bytes: { type: integer }
        ip: { type: string }
        protocol: { type: string }

    StatusResponse:
      type: object
      properties:
        status: { type: string, example: ok }

    ErrorResponse:
      type: object
      properties:
        error: { type: string }

    SingleStreamInfo:
      type: object
      properties:
        broadcastId: { type: string }
        publisherId: { type: string, nullable: true }
        viewers: { type: integer }
        duration: { type: integer }
        bitrate: { type: integer }
        startTime: { type: integer, nullable: true }
        state: { $ref: '#/components/schemas/BroadcastState' }
        publisherState: { $ref: '#/components/schemas/SessionState' }
        arguments: { type: object }

    FissionStats:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: object
          properties:
            fission:
              type: array
              items:
                type: object
                properties:
                  app: { type: string }
                  name: { type: string }
                  state: { $ref: '#/components/schemas/SessionState' }
                  path: { type: string }
                  id: { type: string }
                  ts: { type: integer }
                  config: { type: object }

    RelayStats:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: object
          properties:
            relays:
              type: array
              items:
                $ref: '#/components/schemas/RelayInfo'

    RelayInfo:
      type: object
      properties:
        app: { type: string }
        name: { type: string }
        state: { $ref: '#/components/schemas/SessionState' }
        path: { type: string }
        url: { type: string }
        mode: { type: string }
        ts: { type: integer }
        id: { type: string }

    TransStats:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: object
          properties:
            trans:
              type: array
              items:
                type: object
                properties:
                  app: { type: string }
                  name: { type: string }
                  state: { $ref: '#/components/schemas/SessionState' }
                  path: { type: string }
                  id: { type: string }
                  ts: { type: integer }
                  config: { type: object }

    SwitchStats:
      type: array
      items:
        $ref: '#/components/schemas/SwitchTaskStatus'

    SwitchTaskStatus:
      type: object
      properties:
        app: { type: string }
        name: { type: string }
        outputPath: { type: string }
        state: { $ref: '#/components/schemas/BroadcastState' }
        activeSource: { type: string, nullable: true }
        pendingSource: { type: string, nullable: true }
        isSwitching: { type: boolean }
        sources:
          type: array
          items: { type: string }
        defaultSource: { type: string, nullable: true }

    SwitchRequest:
      type: object
      required: [path, source]
      properties:
        path: { type: string }
        source: { type: string }

security:
  - basicAuth: []

paths:
  /api/server:
    get:
      tags: [Server]
      summary: Get general server information
      description: Returns general server information. Supports server-sent events for periodic updates.
      responses:
        '200':
          description: Server information retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'
            text/event-stream:
              schema:
                type: string
                description: 'JSON-encoded ServerInfo object preceded by data: '

  /api/server/status:
    get:
      tags: [Server]
      summary: Get running status of server components
      description: Returns running status of server components. Supports server-sent events for periodic updates.
      responses:
        '200':
          description: Component status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerStatus'
            text/event-stream:
              schema:
                type: string
                description: 'JSON-encoded ServerStatus object preceded by data: '

  /api/server/config:
    get:
      tags: [Server]
      summary: Get current server configuration
      responses:
        '200':
          description: Configuration retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
    patch:
      tags: [Server]
      summary: Update server configuration
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'

  /api/server/logs:
    get:
      tags: [Server]
      summary: Get server logs
      description: Returns a server-sent events stream of server logs.
      responses:
        '200':
          description: A stream of log messages.
          content:
            text/event-stream:
              schema:
                type: string
                example: "data: 2026-05-16 11:13:00 12345 [INFO] Server started\n\n"

  /api/server/{server}/start:
    post:
      tags: [Server]
      summary: Start a specific server component
      parameters:
        - name: server
          in: path
          required: true
          schema:
            type: string
            enum: [rtmp, av, trans, relay, fission, switch, static]
      responses:
        '200':
          description: Server started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Server already running
        '404':
          description: Server not found

  /api/server/{server}/stop:
    post:
      tags: [Server]
      summary: Stop a specific server component
      parameters:
        - name: server
          in: path
          required: true
          schema:
            type: string
            enum: [rtmp, av, trans, relay, fission, switch, static]
      responses:
        '200':
          description: Server stopped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Server not running
        '404':
          description: Server not found

  /api/streams:
    get:
      tags: [Streams]
      summary: List all active streams and subscribers
      description: Returns a list of all active streams and their subscribers. Supports server-sent events for periodic updates.
      responses:
        '200':
          description: List of streams retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamStats'
            text/event-stream:
              schema:
                type: string
                description: 'JSON-encoded StreamStats object preceded by data: '

  /api/streams/tree:
    get:
      tags: [Streams]
      summary: List all active streams and sessions in a tree structure
      description: Returns a tree of all active streams and sessions. Supports server-sent events for periodic updates.
      responses:
        '200':
          description: A tree of streams and sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamsTree'
            text/event-stream:
              schema:
                type: string
                description: 'JSON-encoded StreamsTree object preceded by data: '

  /api/streams/{app}/{stream}:
    get:
      tags: [Streams]
      summary: Get information about a specific stream
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: string }
        - name: stream
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Stream information retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleStreamInfo'
    delete:
      tags: [Streams]
      summary: Terminate a specific stream
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: string }
        - name: stream
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Stream terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/streams/{app}/{stream}/stop:
    post:
      tags: [Streams]
      summary: Stop a specific broadcast
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: string }
        - name: stream
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Broadcast stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Broadcast not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/streams/session/{id}/start:
    post:
      tags: [Streams]
      summary: Start a specific session
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/streams/session/{id}/stop:
    post:
      tags: [Streams]
      summary: Stop a specific session
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/streams/session/{id}/restart:
    post:
      tags: [Streams]
      summary: Restart a specific session
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Session restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fission:
    get:
      tags: [Fission]
      summary: List active fission tasks
      description: Returns a list of active fission tasks. Supports server-sent events for periodic updates.
      responses:
        '200':
          description: Fission tasks retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FissionStats'
            text/event-stream:
              schema:
                type: string
                description: 'JSON-encoded FissionStats object preceded by data: '

  /api/fission/{id}:
    delete:
      tags: [Fission]
      summary: Delete a specific fission task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Fission task deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Fission task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fission/start/{id}:
    post:
      tags: [Fission]
      summary: Start a specific fission task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Fission task started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Fission task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fission/restart/{id}:
    post:
      tags: [Fission]
      summary: Restart a specific fission task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Fission task restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Fission task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/relay:
    get:
      tags: [Relay]
      summary: List active relay tasks
      description: Returns a list of active relay tasks. Supports server-sent events for periodic updates.
      responses:
        '200':
          description: Relay tasks retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelayStats'
            text/event-stream:
              schema:
                type: string
                description: 'JSON-encoded RelayStats object preceded by data: '

  /api/relay/{id}:
    get:
      tags: [Relay]
      summary: Get relay task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Relay task retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RelayInfo'
    delete:
      tags: [Relay]
      summary: Delete a specific relay task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Relay task deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Relay task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/relay/start/{id}:
    post:
      tags: [Relay]
      summary: Start a specific relay task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Relay task started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Relay task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/relay/restart/{id}:
    post:
      tags: [Relay]
      summary: Restart a specific relay task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Relay task restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Relay task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/relay/{app}/{name}:
    get:
      tags: [Relay]
      summary: Get relay tasks by app and stream name
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: string }
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
